name: ghana_blockchain_document_verification
description: Ghana National Unified Blockchain-Based Document Verification System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  
  # Blockchain & Web3
  web3dart: ^2.7.3
  http: ^1.1.0
  
  # State Management
  provider: ^6.1.1
  
  # File Handling
  file_picker: ^8.0.0
  image_picker: ^1.0.5
  path_provider: ^2.1.1
  
  # Cryptography
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  fluttertoast: ^8.2.4
  
  # HTTP Client
  dio: ^5.4.0
  http_parser: ^4.0.2
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Date & Time
  intl: ^0.18.1
  
  # UUID Generation
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/contracts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700

